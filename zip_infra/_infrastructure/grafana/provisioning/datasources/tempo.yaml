apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    orgId:     1
    url:       http://prometheus:9090
    isDefault: true
    version:   1
    editable:  false
    uid:       prometheus
    jsonData:
      httpMethod:        POST
      exemplarTraceIdDestinations:
        - name:            traceID
          datasourceUid:   tempo

  - name:    Loki
    type:    loki
    access:  proxy
    orgId:   1
    url:     http://loki:3100
    version: 1
    editable: false
    uid:     loki
    jsonData:
      derivedFields:
        - matcherRegex:   "traceId=(\\w+)"
          name:           traceId
          url:            "$${__value.raw}"
          datasourceUid:  tempo

  - name:    Tempo
    type:    tempo
    access:  proxy
    orgId:   1
    url:     http://tempo:3200
    version: 1
    editable: false
    uid:     tempo
    jsonData:
      httpMethod:  GET
      tracesToLogs:
        datasourceUid:   loki
        mapTagNamesEnabled: true
        mappedTags:
          - key:   service.name
            value: service
        filterByTraceID:  true
        filterBySpanID:   false
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key:   service.name
            value: service
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true