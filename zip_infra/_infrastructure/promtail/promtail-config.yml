server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name:   label
            values: ["com.docker.compose.project=selleasi-dev"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex:         "/(.*)"
        target_label:  container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:  service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label:  project

    pipeline_stages:
      - json:
          expressions:
            level:     level
            message:   message
            event:     event
            requestId: requestId
            traceId:   traceId
            spanId:    spanId
            service:   service
            userId:    userId
            storeId:   storeId
            sagaId:    sagaId

      - labels:
          level:
          event:
          service:

      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z"