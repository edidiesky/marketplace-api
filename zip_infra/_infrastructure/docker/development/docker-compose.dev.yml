name: selleasi-dev

networks:
  selleasi-frontend:
    driver: bridge
  selleasi-gateway:
    driver: bridge
  selleasi-services:
    driver: bridge
  selleasi-data:
    driver: bridge
  selleasi-monitoring:
    driver: bridge

volumes:
  redis-data:
  grafana-data:
  loki-data:
  rabbitmq-data:
  tempo-data:
  es-data:
  mongo-data:
  ui-dist:
  prom-data:
services:

  # DATA LAYER

  redis:
    image: redis:7.0-alpine
    container_name: selleazy_redis
    networks:
      - selleasi-data
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - ""
      - --appendonly
      - no
      - --loglevel
      - warning
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --stop-writes-on-bgsave-error
      - no
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: selleazi_rabbitmq
    hostname: selleasi-rabbit
    networks:
      - selleasi-data
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ../../../_infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../../../_infrastructure/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ../../../_infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: selleazy_elasticsearch
    hostname: elasticsearch
    networks:
      - selleasi-data
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # MONITORING

  tempo:
    image: grafana/tempo:latest
    user: root
    container_name: selleazy_tempo
    ports:
      - "3201:3200"
      - "4319:4318"
      - "4320:4317"
    networks:
      - selleasi-monitoring
      - selleasi-services
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../../../_infrastructure/tempo/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: selleazy_loki
    ports:
      - "3101:3100"
    networks:
      - selleasi-monitoring
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    volumes:
      - loki-data:/loki
      - ../../../_infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: selleazy_promtail
    networks:
      - selleasi-monitoring
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../../_infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: selleazy_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=3d"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    networks:
      - selleasi-monitoring
      - selleasi-services
    volumes:
      - ../../../_infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: selleazy_grafana
    ports:
      - "3001:3000"
    networks:
      - selleasi-monitoring
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_FEATURE_TOGGLES_ENABLE=alertingSimplifiedRouting,alertingQueryAndExpressionsStepMode
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-exploretraces-app
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../../_infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  # FRONTEND (commented out until frontend build issues resolved)

  # frontend:
  #   build:
  #     context: ../../../
  #     dockerfile: frontend/Dockerfile
  #   container_name: selleazy_frontend
  #   volumes:
  #     - ui-dist:/srv/ui
  #   networks:
  #     - selleasi-frontend
