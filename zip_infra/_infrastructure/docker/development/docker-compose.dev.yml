  # GATEWAY

  caddy:
    image: caddy:2-alpine
    container_name: selleazy_caddy
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ../../../_infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ui-dist:/srv/ui:ro
    networks:
      - selleasi-gateway
    depends_on:
      api-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../../
      dockerfile: Dockerfile.service
      args:
        SERVICE_PORT: 8000
        SERVICE_DIR:  backend/api-gateway
    container_name: selleazy_api_gateway
    env_file:
      - ../../../.env
      - ../../../backend/api-gateway/.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - selleasi-gateway
      - selleasi-services
      - selleasi-data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

