    expose:
      - "4004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    build:
      context: ../../../payment
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  notification:
    container_name: selleasi-notification
    restart: unless-stopped
    env_file:
      - ./env/notification.env
    networks:
      - selleasi-network
    expose:
