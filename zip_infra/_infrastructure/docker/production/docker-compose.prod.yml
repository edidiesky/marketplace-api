    restart: unless-stopped
    env_file:
      - ./env/stores.env
    networks:
      - selleasi-network
    expose:
      - "4007"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4007/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    build:
      context: ../../../stores
