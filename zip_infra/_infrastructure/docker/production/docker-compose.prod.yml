networks:
  selleasi-network:
    driver: bridge

services:
  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - selleasi-network
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  api-gateway:
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ./env/api-gateway.env
    networks:
      - selleasi-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    build:
      context: ../../../api-gateway
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  authentication:
    container_name: selleasi-authentication
    restart: unless-stopped
    env_file:
      - ./env/authentication.env
    networks:
      - selleasi-network
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    build:
      context: ../../../authentication
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  products:
    container_name: selleasi-products
    restart: unless-stopped
    env_file:
      - ./env/products.env
    networks:
      - selleasi-network
