global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: authentication
    static_configs:
      - targets: ["authentication:4001"]
    metrics_path: /metrics

  - job_name: audit
    static_configs:
      - targets: ["audit:4002"]
    metrics_path: /metrics

  - job_name: products
    static_configs:
      - targets: ["products:4003"]
    metrics_path: /metrics

  - job_name: payment
    static_configs:
      - targets: ["payment:4004"]
    metrics_path: /metrics

