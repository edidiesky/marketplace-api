name: selleasi-dev

networks:
  selleasi-frontend:
    driver: bridge
  selleasi-gateway:
    driver: bridge
  selleasi-services:
    driver: bridge
  selleasi-data:
    driver: bridge
  selleasi-monitoring:
    driver: bridge

volumes:
  prom_data:
  redis-data:
  grafana_data:
  loki_data:
  rabbitmq_data:
  tempo-data:
  es-data:
  mongo-local-data:
  ui_dist:

services:

  # DATA LAYER

  mongodb:
    image: mongo:7
    container_name: selleasi_mongodb
    networks:
      - selleasi-data
    ports:
      - "27018:27017"
    volumes:
      - mongo-local-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: selleasi_redis
    networks:
      - selleasi-data
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: selleasi_rabbitmq
    hostname: selleasi-rabbit
    networks:
      - selleasi-data
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: selleasi
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ../../rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../../rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ../../rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: selleasi_elasticsearch
    hostname: elasticsearch
    networks:
      - selleasi-data
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # FRONTEND

  frontend:
    build:
      context: ../../../../frontend
      dockerfile: Dockerfile
    container_name: selleasi_frontend
    volumes:
      - ui_dist:/srv/ui
    networks:
      - selleasi-frontend
    restart: "no"

  # GATEWAY

  caddy:
    image: caddy:2-alpine
    container_name: selleasi_caddy
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ../../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ui_dist:/srv/ui:ro
    networks:
      - selleasi-frontend
      - selleasi-gateway
    depends_on:
      frontend:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/caddy/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api-gateway:
    build:
      context: ../../../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: selleasi_api_gateway
    env_file:
      - ../../../../backend/api-gateway/.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - selleasi-gateway
      - selleasi-services
      - selleasi-data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # CORE SERVICES

  authentication:
    build:
      context: ../../../../backend/authentication
      dockerfile: Dockerfile
    container_name: selleasi_authentication
    env_file:
      - ../../../../backend/authentication/.env
    ports:
      - "4001:4001"
    networks:
      - selleasi-services
      - selleasi-data
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
