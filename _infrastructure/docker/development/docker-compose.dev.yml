  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - selleasi-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - selleasi-network
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    volumes:
      - loki_data:/loki
      - ../../loki/loki-config.yml:/etc/loki/loki-config.yml
  promtail:
    image: grafana/promtail:latest
    networks:
      - selleasi-network
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../../products:/app/products
      - ../../../inventory:/app/inventory
      - ../../../payment:/app/payment
      - ../../../stores:/app/stores
      - ../../../cart:/app/cart
      - ../../../tenant:/app/tenant
      - ../../../review:/app/review
      - ../../../orders:/app/orders
      - ../../../notification:/app/notification
      - ../../../api-gateway:/app/api-gateway

  tempo:
    image: grafana/tempo:latest
    user: root
    ports:
      - "3200:3200"
      - "4318:4318"
      - "4317:4317"
    networks:
      - selleasi-network
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../../tempo/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - selleasi-network
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=alertingSimplifiedRouting,alertingQueryAndExpressionsStepMode
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-exploretraces-app
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../grafana/provisioning/datasources/tempo.yaml:/etc/grafana/provisioning/datasources/tempo.yaml

