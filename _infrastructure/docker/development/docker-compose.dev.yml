  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    # container_name: kafka-ui
    networks:
      - selleasi-network
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: selleasi-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      DYNAMIC_CONFIG_ENABLED: true
    depends_on:
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy

  api-gateway:
    depends_on:
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      tempo:
        condition: service_started
    env_file:
      - ../../../api-gateway/.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - selleasi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    build:
      context: ../../../api-gateway
      dockerfile: Dockerfile
