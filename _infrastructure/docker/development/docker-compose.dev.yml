  # MONITORING

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: selleasi_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=3d"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    networks:
      - selleasi-monitoring
      - selleasi-services
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: selleasi_loki
    ports:
      - "3101:3100"
    networks:
      - selleasi-monitoring
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    volumes:
      - loki_data:/loki
      - ../../loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: selleasi_promtail
    networks:
      - selleasi-monitoring
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    restart: unless-stopped
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:latest
    user: root
    container_name: selleasi_tempo
    ports:
      - "3201:3200"
      - "4319:4318"
      - "4320:4317"
    networks:
      - selleasi-monitoring
      - selleasi-services
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../../tempo/tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: selleasi_grafana
    ports:
      - "3001:3000"
    networks:
      - selleasi-monitoring
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=alertingSimplifiedRouting,alertingQueryAndExpressionsStepMode
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-exploretraces-app
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped